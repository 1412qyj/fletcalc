name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          flet build apk --project fletcalc --yes

      - name: Debug APK output
        run: |
          find . -name "*.apk" -type f 2>/dev/null
          ls -la build/flutter-apk/ 2>/dev/null || echo "Directory not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: fletcalc-apk
          path: build/flutter-apk/
