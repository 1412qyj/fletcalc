name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
      
      - name: Create pubspec.yaml for Python Flet app
        run: |
          cat > pubspec.yaml << 'EOF'
          name: fletcalc
          version: 1.0.0+1
          publish_to: 'none'
          
          environment:
            sdk: '>=3.0.0 <4.0.0'
          
          dependencies:
            flutter:
              sdk: flutter
            flet: ^0.21.0
          
          flutter:
            uses-material-design: true
          EOF
      
      - name: Install dependencies
        run: |
          flutter config --no-analytics
          flutter pub get
      
      - name: Copy Python files
        run: |
          mkdir -p lib
          cp main.py lib/ 2>/dev/null || true
          cp calculator_logic.py lib/ 2>/dev/null || true
      
      - name: Build APK
        run: |
          flutter build apk --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: fletcalc-apk
          path: build/app/outputs/flutter-apk/*.apk
