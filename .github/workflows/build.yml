name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install flet
      
      - name: Build APK
        run: |
          flet build apk --project fletcalc
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: fletcalc-apk
          path: build/flutter-apk/*.apk
